<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nama Web Anda</title>
    <meta name="theme-color" content="#dc2626">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/tewetech/favicon/refs/heads/main/tewe.png">
    <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22NAMA_APLIKASI_ANDA%22%2C%22short_name%22%3A%22SINGKATAN%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23ffffff%22%2C%22theme_color%22%3A%22%23dc2626%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Fraw.githubusercontent.com%2Ftewetech%2Ffavicon%2Frefs%2Fheads%2Fmain%2Ftewe.png%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fpng%22%7D%2C%7B%22src%22%3A%22https%3A%2F%2Fraw.githubusercontent.com%2Ftewetech%2Ffavicon%2Frefs%2Fheads%2Fmain%2Ftewe.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <div class="flex items-center justify-center h-screen">
        <h1 class="text-2xl font-bold">Web Ini Sudah Support PWA</h1>
    </div>

    <button id="btnInstall" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-[#dc2626] text-white px-8 py-3 rounded-full shadow-xl font-bold z-50 hover:bg-red-700 transition-colors">
        Instal Aplikasi
    </button>

    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swScript = `
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => self.clients.claim());
                self.addEventListener('fetch', e => {
                    e.respondWith(fetch(e.request).catch(() => new Response('Offline')));
                });
            `;
            
            const blob = new Blob([swScript], { type: 'text/javascript' });
            const swUrl = URL.createObjectURL(blob);
            
            navigator.serviceWorker.register(swUrl).catch(() => {});
        });
    }

    let deferredPrompt;
    const btnInstall = document.getElementById('btnInstall');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
    });

    btnInstall.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                btnInstall.style.display = 'none';
            }
            deferredPrompt = null;
        } else {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            if (isIOS) {
                alert('Untuk menginstal di iOS: Tekan ikon "Share" di bawah, lalu pilih "Add to Home Screen".');
            } else {
                alert('Pemasangan otomatis belum siap. Pastikan web diakses melalui HTTPS/localhost, atau mungkin aplikasi ini sudah terinstal di perangkat Anda.');
            }
        }
    });

    window.addEventListener('appinstalled', () => {
        btnInstall.style.display = 'none';
    });
    </script>
</body>
</html>
