<script>
let tableNumber = new URLSearchParams(window.location.search).get('to');

let storeSettings = JSON.parse(localStorage.getItem('restoSettings')) || {
    name: 'Tewe Menu',
    wa: '',
    address: '',
    logo: '',
    favicon: ''
};

let users = JSON.parse(localStorage.getItem('restoUsers'));
if (!users || users.length === 0) {
    users = [{ id: 'user_default', u: 'admin', p: 'admin', role: 'manager' }];
    localStorage.setItem('restoUsers', JSON.stringify(users));
} else {
    let updated = false;
    users.forEach(u => {
        if (!u.role) {
            u.role = 'manager';
            updated = true;
        }
    });
    if (updated) localStorage.setItem('restoUsers', JSON.stringify(users));
}

let categories = JSON.parse(localStorage.getItem('restoCategories'));
if (!categories || categories.length === 0) {
    categories = [
        { id: 'cat_1', name: 'Makanan' },
        { id: 'cat_2', name: 'Minuman' }
    ];
    localStorage.setItem('restoCategories', JSON.stringify(categories));
}

let menus = JSON.parse(localStorage.getItem('restoMenus')) || [];
let cart = [];

let tablesData = JSON.parse(localStorage.getItem('restoTablesData')) || { baseUrl: '', tables: [] };

let isEditing = false;
let editId = null;

let isEditingUser = false;
let editUserId = null;

let isEditingCategory = false;
let editCategoryId = null;

let activeAdminMenuFilter = 'all';
let currentAdminTab = 'tambah-menu';
let isDashboardView = false;
let mobileNavGroup = 'A';

let confirmCallback = null;

function showConfirmPopup(msg, title, callback) {
    document.getElementById('confirm-title').innerText = title;
    document.getElementById('confirm-message').innerText = msg;
    document.getElementById('custom-confirm').classList.remove('hidden');
    confirmCallback = callback;
}

function executeConfirm() {
    if(confirmCallback) confirmCallback();
    closeConfirmPopup();
}

function closeConfirmPopup() {
    document.getElementById('custom-confirm').classList.add('hidden');
    confirmCallback = null;
}

function applySettings() {
    document.getElementById('setting-name').value = storeSettings.name || '';
    document.getElementById('setting-wa').value = storeSettings.wa || '';
    document.getElementById('setting-address').value = storeSettings.address || '';

    if (storeSettings.logo) {
        document.getElementById('preview-logo').classList.remove('hidden');
        document.getElementById('preview-logo').querySelector('img').src = storeSettings.logo;
        document.getElementById('nav-brand-logo').src = storeSettings.logo;
        document.getElementById('nav-brand-logo').classList.remove('hidden');
        document.getElementById('login-brand-logo').src = storeSettings.logo;
        document.getElementById('login-brand-logo').classList.remove('hidden');
        document.getElementById('login-default-icon').classList.add('hidden');
    } else {
        document.getElementById('login-brand-logo').classList.add('hidden');
        document.getElementById('login-default-icon').classList.remove('hidden');
    }
    
    if (storeSettings.favicon) {
        document.getElementById('preview-favicon').classList.remove('hidden');
        document.getElementById('preview-favicon').querySelector('img').src = storeSettings.favicon;
        document.getElementById('dynamic-favicon').href = storeSettings.favicon;
    }

    if (storeSettings.address) {
        document.getElementById('nav-brand-address').innerText = storeSettings.address;
        document.getElementById('nav-brand-address').classList.remove('hidden');
    } else {
        document.getElementById('nav-brand-address').classList.add('hidden');
    }

    const titleText = storeSettings.name || 'Tewe Menu';
    document.getElementById('nav-brand-text').innerText = titleText;
    document.getElementById('page-title').innerText = titleText;
}

async function saveSettings(e) {
    e.preventDefault();
    storeSettings.name = document.getElementById('setting-name').value;
    storeSettings.wa = document.getElementById('setting-wa').value;
    storeSettings.address = document.getElementById('setting-address').value;

    const logoFile = document.getElementById('setting-logo').files[0];
    if (logoFile) storeSettings.logo = await getBase64(logoFile);

    const faviconFile = document.getElementById('setting-favicon').files[0];
    if (faviconFile) storeSettings.favicon = await getBase64(faviconFile);

    localStorage.setItem('restoSettings', JSON.stringify(storeSettings));
    applySettings();
    showToast('Pengaturan toko berhasil disimpan!');
}

function showToast(msg) {
    const toast = document.getElementById('custom-toast');
    document.getElementById('toast-message').innerText = msg;
    toast.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-10');
    setTimeout(() => {
        toast.classList.add('opacity-0', 'pointer-events-none', '-translate-y-10');
    }, 3000);
}

function showPopup(msg, title = 'Informasi') {
    document.getElementById('popup-title').innerText = title;
    document.getElementById('popup-message').innerText = msg;
    document.getElementById('custom-popup').classList.remove('hidden');
}

function closePopup() {
    document.getElementById('custom-popup').classList.add('hidden');
}

function formatPriceInput(input) {
    let value = input.value.replace(/\./g, '');
    value = value.replace(/[^0-9]/g, '');
    if (value) {
        input.value = new Intl.NumberFormat('id-ID').format(value);
    } else {
        input.value = '';
    }
}

function showView(viewId) {
    document.getElementById('public-view').classList.add('hidden');
    document.getElementById('login-view').classList.add('hidden');
    document.getElementById('login-view').classList.remove('flex');
    document.getElementById('dashboard-view').classList.remove('flex');
    document.getElementById('dashboard-view').classList.add('hidden');

    const floatingBtn = document.getElementById('floating-cart-btn');

    if (viewId === 'public-view') {
        document.getElementById('public-view').classList.remove('hidden');
        renderPublicCategories(document.querySelector('#public-category-filters .bg-gradient-to-r')?.innerText.toLowerCase() === 'semua' ? 'all' : (categories.find(c => c.name === document.querySelector('#public-category-filters .bg-gradient-to-r')?.innerText)?.id || 'all'));
        renderPublic('all');
        updateCartUI();
        isDashboardView = false;
        updateMobileNavVisibility();
    } else if (viewId === 'dashboard-view') {
        document.getElementById('dashboard-view').classList.remove('hidden');
        document.getElementById('dashboard-view').classList.add('flex');
        floatingBtn.classList.add('hidden');
        
        if (sessionStorage.getItem('role') === 'staff') {
            document.getElementById('user-form-container').classList.add('hidden');
            document.getElementById('btn-tab-pengaturan').classList.add('hidden');
        } else {
            document.getElementById('user-form-container').classList.remove('hidden');
            document.getElementById('btn-tab-pengaturan').classList.remove('hidden');
        }

        renderAdminCategoryFilters();
        renderCategoryRadios();
        switchTab(currentAdminTab);
        isDashboardView = true;
        updateMobileNavVisibility();
    } else if (viewId === 'login-view') {
        document.getElementById('login-view').classList.remove('hidden');
        document.getElementById('login-view').classList.add('flex');
        floatingBtn.classList.add('hidden');
    }
}

function toggleDashboardPublic() {
    if (isDashboardView) {
        showView('public-view');
    } else {
        showView('dashboard-view');
    }
}

function toggleMobileNav() {
    mobileNavGroup = mobileNavGroup === 'A' ? 'B' : 'A';
    updateMobileNavVisibility();
}

function updateMobileNavVisibility() {
    const isDesktop = window.innerWidth >= 768;
    const groupA = ['btn-tab-tambah-menu', 'btn-tab-daftar-menu', 'btn-tab-kategori'];
    const groupB = ['btn-tab-meja', 'btn-tab-user', 'btn-tab-pengaturan'];
    const isStaff = sessionStorage.getItem('role') === 'staff';
    const swapBtn = document.getElementById('btn-mobile-swap');

    if (isDesktop) {
        groupA.forEach(id => {
            const el = document.getElementById(id);
            if(el) el.style.display = '';
        });
        groupB.forEach(id => {
            const el = document.getElementById(id);
            if(el) {
                if (isStaff && id === 'btn-tab-pengaturan') {
                    el.style.display = 'none';
                } else {
                    el.style.display = '';
                }
            }
        });
        if (swapBtn) swapBtn.style.display = 'none';
    } else {
        groupA.forEach(id => {
            const el = document.getElementById(id);
            if(el) el.style.display = mobileNavGroup === 'A' ? 'flex' : 'none';
        });
        groupB.forEach(id => {
            const el = document.getElementById(id);
            if(el) {
                if (isStaff && id === 'btn-tab-pengaturan') {
                    el.style.display = 'none';
                } else {
                    el.style.display = mobileNavGroup === 'B' ? 'flex' : 'none';
                }
            }
        });
        if (swapBtn) {
            swapBtn.style.display = isDashboardView ? 'flex' : 'none';
        }
    }
}

window.addEventListener('resize', updateMobileNavVisibility);

function switchTab(tabId) {
    currentAdminTab = tabId;
    document.getElementById('tab-tambah-menu').classList.add('hidden');
    document.getElementById('tab-daftar-menu').classList.add('hidden');
    document.getElementById('tab-kategori').classList.add('hidden');
    document.getElementById('tab-meja').classList.add('hidden');
    document.getElementById('tab-user').classList.add('hidden');
    document.getElementById('tab-pengaturan').classList.add('hidden');
    
    const inactiveClass = 'flex flex-col md:flex-row items-center justify-center md:justify-start text-center md:text-left px-1 md:px-3 py-2 md:py-2.5 rounded-xl text-[10px] md:text-sm font-bold text-gray-600 hover:bg-white/60 transition-all gap-1 md:gap-2 flex-1 md:flex-none md:w-full flex-shrink-0';
    const activeClass = 'flex flex-col md:flex-row items-center justify-center md:justify-start text-center md:text-left px-1 md:px-3 py-2 md:py-2.5 rounded-xl text-[10px] md:text-sm font-bold bg-gradient-to-r from-red-600 to-orange-500 text-white transition-all gap-1 md:gap-2 flex-1 md:flex-none md:w-full flex-shrink-0';
    
    document.getElementById('btn-tab-tambah-menu').className = inactiveClass;
    document.getElementById('btn-tab-daftar-menu').className = inactiveClass;
    document.getElementById('btn-tab-kategori').className = inactiveClass;
    document.getElementById('btn-tab-meja').className = inactiveClass;
    document.getElementById('btn-tab-user').className = inactiveClass;
    document.getElementById('btn-tab-pengaturan').className = inactiveClass;
    
    document.getElementById(`tab-${tabId}`).classList.remove('hidden');
    document.getElementById(`btn-tab-${tabId}`).className = activeClass;
    
    if(tabId === 'meja') {
        renderAdminTables();
    }
}

function showPublic() {
    showView('public-view');
}

function checkAdmin() {
    if (sessionStorage.getItem('isLoggedIn') === 'true') {
        showView('dashboard-view');
        document.getElementById('nav-logout-top').classList.remove('hidden');
        document.getElementById('nav-dashboard-toggle').classList.remove('hidden');
        document.getElementById('nav-admin-btn').classList.add('hidden');
    } else {
        showView('login-view');
    }
}

function login(e) {
    e.preventDefault();
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;
    
    const validUser = users.find(user => user.u === u && user.p === p);

    if (validUser) {
        sessionStorage.setItem('isLoggedIn', 'true');
        sessionStorage.setItem('role', validUser.role || 'manager');
        sessionStorage.setItem('userId', validUser.id);
        document.getElementById('login-form').reset();
        document.getElementById('nav-logout-top').classList.remove('hidden');
        document.getElementById('nav-dashboard-toggle').classList.remove('hidden');
        document.getElementById('nav-admin-btn').classList.add('hidden');
        showView('dashboard-view');
    } else {
        showToast('Username atau password salah!');
    }
}

function logout() {
    sessionStorage.removeItem('isLoggedIn');
    sessionStorage.removeItem('role');
    sessionStorage.removeItem('userId');
    document.getElementById('nav-logout-top').classList.add('hidden');
    document.getElementById('nav-dashboard-toggle').classList.add('hidden');
    document.getElementById('nav-admin-btn').classList.remove('hidden');
    showPublic();
    showToast('Berhasil logout');
}

function formatRupiah(angka) {
    return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
}

function getBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
}

function saveUser(e) {
    e.preventDefault();
    const u = document.getElementById('user-u').value;
    const p = document.getElementById('user-p').value;
    const role = document.querySelector('input[name="user-role"]:checked')?.value || 'manager';

    const currentRole = sessionStorage.getItem('role');
    if (currentRole === 'staff' && editUserId !== sessionStorage.getItem('userId')) {
        return;
    }

    if (isEditingUser) {
        const index = users.findIndex(usr => usr.id === editUserId);
        if (index !== -1) {
            users[index].u = u;
            users[index].p = p;
            if (currentRole === 'manager') {
                users[index].role = role;
            }
        }
        resetUserFormState();
    } else {
        if (currentRole === 'staff') return;
        const newUser = {
            id: 'user_' + Date.now().toString(),
            u,
            p,
            role
        };
        users.push(newUser);
    }

    localStorage.setItem('restoUsers', JSON.stringify(users));
    document.getElementById('user-form').reset();
    renderAdminUsers();
    showToast('Data user berhasil disimpan!');
}

function editUser(id) {
    const user = users.find(usr => usr.id === id);
    if (user) {
        document.getElementById('user-u').value = user.u;
        document.getElementById('user-p').value = user.p;
        
        const roleRadios = document.getElementsByName('user-role');
        for(let radio of roleRadios) {
            if(radio.value === (user.role || 'manager')) radio.checked = true;
        }
        
        if (sessionStorage.getItem('role') === 'staff') {
            for(let radio of roleRadios) radio.disabled = true;
        } else {
            for(let radio of roleRadios) radio.disabled = false;
        }

        isEditingUser = true;
        editUserId = id;
        document.getElementById('user-form-title').innerHTML = '<svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg> Edit Data User';
        document.getElementById('btn-cancel-user').classList.remove('hidden');
        document.getElementById('user-form-container').classList.remove('hidden');
    }
}

function resetUserForm() {
    document.getElementById('user-form').reset();
    resetUserFormState();
}

function resetUserFormState() {
    isEditingUser = false;
    editUserId = null;
    const roleRadios = document.getElementsByName('user-role');
    for(let radio of roleRadios) radio.disabled = false;
    document.getElementById('user-form-title').innerHTML = '<svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg> Tambah User Baru';
    document.getElementById('btn-cancel-user').classList.add('hidden');
    if (sessionStorage.getItem('role') === 'staff') {
        document.getElementById('user-form-container').classList.add('hidden');
    }
}

function deleteUser(id) {
    if (users.length <= 1) {
        showToast('Gagal! Sistem membutuhkan minimal 1 user admin.');
        return;
    }
    showConfirmPopup('Apakah Anda yakin ingin menghapus user ini?', 'Hapus User', () => {
        users = users.filter(usr => usr.id !== id);
        localStorage.setItem('restoUsers', JSON.stringify(users));
        renderAdminUsers();
        showToast('User berhasil dihapus!');
    });
}

function deleteAllUsers() {
    showConfirmPopup('Yakin ingin menghapus SEMUA user kecuali Manager pertama?', 'Hapus Semua User', () => {
        const adminUser = users.find(u => u.role === 'manager');
        users = adminUser ? [adminUser] : [];
        if(users.length === 0) users = [{ id: 'user_default', u: 'admin', p: 'admin', role: 'manager' }];
        localStorage.setItem('restoUsers', JSON.stringify(users));
        renderAdminUsers();
        showToast('Semua user lainnya berhasil dihapus!');
    });
}

function renderAdminUsers() {
    const container = document.getElementById('admin-user-list');
    container.innerHTML = '';
    const currentRole = sessionStorage.getItem('role');
    const currentId = sessionStorage.getItem('userId');
    
    let displayUsers = users;
    if (currentRole === 'staff') {
        displayUsers = users.filter(usr => usr.id === currentId);
    }
    
    displayUsers.forEach(usr => {
        const div = document.createElement('div');
        div.className = 'glass-effect p-4 rounded-xl shadow-sm border border-white flex flex-col gap-2 relative transition-all hover:scale-[1.02]';
        const roleLabel = usr.role === 'staff' ? '<span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded-md text-[10px] font-bold uppercase">Staff</span>' : '<span class="bg-red-100 text-red-700 px-2 py-1 rounded-md text-[10px] font-bold uppercase">Manager</span>';
        
        let actionButtons = '';
        if (currentRole === 'manager' || currentId === usr.id) {
            actionButtons += `<button onclick="editUser('${usr.id}')" class="bg-blue-50 text-blue-600 border border-blue-200 p-1.5 md:p-2 rounded-lg hover:bg-gradient-to-r hover:from-blue-600 hover:to-blue-500 hover:text-white hover:border-transparent transition-all shadow-sm"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>`;
            
            if (currentRole === 'manager') {
                actionButtons += `<button onclick="deleteUser('${usr.id}')" class="bg-red-50 text-red-600 border border-red-200 p-1.5 md:p-2 rounded-lg hover:bg-gradient-to-r hover:from-red-600 hover:to-orange-500 hover:text-white hover:border-transparent transition-all shadow-sm"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>`;
            }
        } else {
            actionButtons = `<span class="text-[10px] text-gray-400 font-semibold bg-gray-100 px-2 py-1 rounded">No Access</span>`;
        }

        div.innerHTML = `
            <div class="flex justify-between items-start mb-2">
                <div>
                    <p class="font-bold text-gray-800 text-sm break-words">${usr.u}</p>
                    <p class="font-semibold text-gray-400 text-xs mt-1">••••••••</p>
                </div>
                ${roleLabel}
            </div>
            <div class="flex justify-end gap-1 mt-auto pt-2 border-t border-gray-100">
                ${actionButtons}
            </div>
        `;
        container.appendChild(div);
    });
}

function saveCategory(e) {
    e.preventDefault();
    const name = document.getElementById('cat-name').value;

    if (isEditingCategory) {
        const index = categories.findIndex(c => c.id === editCategoryId);
        if (index !== -1) {
            categories[index].name = name;
        }
        resetCategoryFormState();
    } else {
        const newCat = {
            id: 'cat_' + Date.now().toString(),
            name
        };
        categories.push(newCat);
    }

    localStorage.setItem('restoCategories', JSON.stringify(categories));
    document.getElementById('category-form').reset();
    renderAdminCategories();
    renderCategoryRadios();
    renderAdminCategoryFilters();
    renderPublicCategories();
    showToast('Kategori berhasil disimpan!');
}

function editCategory(id) {
    const cat = categories.find(c => c.id === id);
    if (cat) {
        document.getElementById('cat-name').value = cat.name;
        isEditingCategory = true;
        editCategoryId = id;
        document.getElementById('cat-form-title').innerHTML = '<svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg> Edit Kategori';
        document.getElementById('btn-cancel-cat').classList.remove('hidden');
    }
}

function resetCategoryForm() {
    document.getElementById('category-form').reset();
    resetCategoryFormState();

async function saveMenu(e) {
    e.preventDefault();
    const name = document.getElementById('menu-name').value;
    const priceString = document.getElementById('menu-price').value;
    const price = parseInt(priceString.replace(/\./g, ''));
    
    const category = document.querySelector('input[name="menu-category"]:checked')?.value || '';
    if(!category) {
        showToast('Silakan pilih kategori terlebih dahulu');
        return;
    }
    
    const status = document.querySelector('input[name="menu-status"]:checked')?.value || 'tersedia';
    const desc = document.getElementById('menu-desc').value;
    const fileInput = document.getElementById('menu-image');

    let imageBase64 = '';
    if (fileInput.files.length > 0) {
        imageBase64 = await getBase64(fileInput.files[0]);
    }

    if (isEditing) {
        const index = menus.findIndex(m => m.id === editId);
        if (index !== -1) {
            menus[index].name = name;
            menus[index].price = price;
            menus[index].category = category;
            menus[index].status = status;
            menus[index].desc = desc;
            if (imageBase64) menus[index].image = imageBase64;
        }
        resetFormState();
    } else {
        const newMenu = {
            id: 'menu_' + Date.now().toString(),
            name,
            price,
            category,
            status,
            desc,
            image: imageBase64 || 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mN88B8AAsUB4Ztv1C4AAAAASUVORK5CYII='
        };
        menus.push(newMenu);
    }

    localStorage.setItem('restoMenus', JSON.stringify(menus));
    document.getElementById('menu-form').reset();
    
    if (!isEditing && category) {
        const catRadio = document.querySelector(`input[name="menu-category"][value="${category}"]`);
        if (catRadio) catRadio.checked = true;
    }
    
    renderAdminMenus();
    showToast('Menu berhasil disimpan!');
}

function editMenu(id) {
    const menu = menus.find(m => m.id === id);
    if (menu) {
        document.getElementById('menu-name').value = menu.name;
        document.getElementById('menu-price').value = new Intl.NumberFormat('id-ID').format(menu.price);
        
        const catRadios = document.getElementsByName('menu-category');
        for(let radio of catRadios) {
            if(radio.value === menu.category) radio.checked = true;
        }
        
        const statusRadios = document.getElementsByName('menu-status');
        for(let radio of statusRadios) {

        document.getElementById('menu-desc').value = menu.desc;

        return;
    }

    if(tablesData.tables.length > 0) {
        const maxNum = Math.max(...tablesData.tables.map(t => t.num));
        nextNumber = maxNum + 1;
    }
    
    const tableName = `No Meja ${nextNumber}`;
    const separator = baseUrlInput.includes('?') ? '&' : '?';
    const tableUrl = `${baseUrlInput}${separator}to=${encodeURIComponent(tableName)}`;
    
    tablesData.tables.push({
        id: 'table_' + Date.now(),
        num: nextNumber,
        name: tableName,
        url: tableUrl
    });
    
    localStorage.setItem('restoTablesData', JSON.stringify(tablesData));
    renderAdminTables();
    showToast('QR Meja berhasil dibuat!');
}

async function downloadQR(url, name) {
    try {
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=${encodeURIComponent(url)}`;
        const response = await fetch(qrUrl);
        const blob = await response.blob();
        const downloadUrl = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = downloadUrl;
        a.download = `QR_${name}.png`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(downloadUrl);
        showToast('QR berhasil didownload!');
    } catch (error) {
        window.open(`https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=${encodeURIComponent(url)}`, '_blank');
    }
}

function updateStepper(id, delta) {
    const menu = menus.find(m => m.id === id);
    if (!menu || menu.status === 'habis') return;

    let item = cart.find(c => c.id === id);
    if (!item && delta > 0) {
        item = { ...menu, qty: 0 };
        cart.push(item);
    }
    if (item) {
        item.qty += delta;
        if (item.qty <= 0) {
            cart = cart.filter(c => c.id !== id);
        }
    }
    
    const qtySpan = document.getElementById(`qty-${id}`);
    if (qtySpan) {
        const currentItem = cart.find(c => c.id === id);
        qtySpan.innerText = currentItem ? currentItem.qty : 0;
    }
    
    updateCartUI();
    if (!document.getElementById('cart-modal').classList.contains('hidden')) {
        renderCartItems();
    }
}

function updateCartUI() {
    const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
    const badge = document.getElementById('cart-badge');
    const floatingBtn = document.getElementById('floating-cart-btn');
    
    if (totalQty > 0 && document.getElementById('public-view').classList.contains('hidden') === false) {
        badge.innerText = totalQty;
        floatingBtn.classList.remove('hidden');
    } else {
        floatingBtn.classList.add('hidden');
    }
}

function showCartModal() {
    document.getElementById('cart-modal').classList.remove('hidden');
    renderCartItems();
}

function hideCartModal() {
    document.getElementById('cart-modal').classList.add('hidden');
}

function renderCartItems() {
    const container = document.getElementById('cart-items');
    container.innerHTML = '';
    
    if (cart.length === 0) {
        container.innerHTML = `
            <div class="flex flex-col items-center justify-center py-8">
                <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-3">
                    <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                </div>
                <p class="text-center text-xs text-gray-500 font-semibold">Pesanan Anda masih kosong</p>
            </div>`;
        setTimeout(hideCartModal, 1500);
        return;
    }

    let cartTotalAmt = 0;
    cart.forEach(item => {
        cartTotalAmt += (item.price * item.qty);
        const div = document.createElement('div');
        div.className = 'flex justify-between items-center bg-white/60 p-3 rounded-2xl shadow-sm border border-gray-100';
        div.innerHTML = `
            <div class="flex items-center gap-3 flex-grow">
                <img src="${item.image}" class="w-12 h-12 object-cover rounded-xl shadow-sm">
                <div>
                    <p class="font-extrabold text-xs text-gray-800 leading-tight">${item.name}</p>
                    <p class="text-red-600 text-xs font-bold mt-0.5">${formatRupiah(item.price)}</p>
                </div>
            </div>
            <div class="flex items-center gap-2 bg-gray-100 rounded-full p-1 shadow-inner">
                <button onclick="updateStepper('${item.id}', -1)" class="w-7 h-7 rounded-full bg-white text-gray-700 font-bold flex items-center justify-center shadow-sm hover:text-red-500 transition-colors">&minus;</button>
                <span class="font-bold w-5 text-center text-xs text-gray-800">${item.qty}</span>
                <button onclick="updateStepper('${item.id}', 1)" class="w-7 h-7 rounded-full bg-gradient-to-r from-red-600 to-orange-500 text-white font-bold flex items-center justify-center shadow-sm hover:scale-105 transition-all">&plus;</button>
            </div>
        `;
        container.appendChild(div);
    });
    
    const totalDiv = document.createElement('div');
    totalDiv.className = 'flex justify-between items-center bg-red-50 p-3 rounded-2xl border border-red-100 mt-2';
    totalDiv.innerHTML = `<span class="font-extrabold text-gray-800 text-sm">Total Belanja</span><span class="font-black text-red-600 text-base">${formatRupiah(cartTotalAmt)}</span>`;
    container.appendChild(totalDiv);
}

function processCheckout() {
    if(cart.length === 0) return;
    
    const customerNameInput = document.getElementById('customer-name').value.trim();
    if(!customerNameInput) {
        showToast('Silakan masukkan nama Anda terlebih dahulu.');
        return;
    }
    
    const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
    
    const confirmMsg = 'Data pesanan akan dikirimkan lewat WA.\nSilakan datang ke kasir untuk membayar terlebih dahulu dengan menunjukan bukti WA nya.\n\nLanjutkan pesanan?';
    
    showConfirmPopup(confirmMsg, 'Konfirmasi Pesanan', () => {
        let textInfo = 'Pesanan berhasil dibuat!\nNama: ' + customerNameInput + '\n';
        if (tableNumber) textInfo += 'Meja: ' + tableNumber + '\n';
        textInfo += '\nTotal Pembayaran: ' + formatRupiah(total) + '\n\nSilakan tunjukkan ke kasir.';
        
        if (storeSettings.wa) {
            let waText = `Halo, saya ingin memesan:\n\nNama Pemesan: ${customerNameInput}\n`;
            if (tableNumber) waText += `Meja: ${tableNumber}\n`;
            waText += `\nPesanan:\n`;
            cart.forEach(item => {
                waText += `- ${item.name} (${item.qty}x) = ${formatRupiah(item.price * item.qty)}\n`;
            });
            waText += `\nTotal Pembayaran: *${formatRupiah(total)}*`;
            
            let waNum = storeSettings.wa.replace(/^0/, '62').replace(/\D/g, '');
            window.open(`https://wa.me/${waNum}?text=${encodeURIComponent(waText)}`, '_blank');
            textInfo = 'Pesanan Anda sedang dialihkan ke WhatsApp kasir.\n\nTotal Pembayaran: ' + formatRupiah(total);
        }
        
        showPopup(textInfo, 'Pesanan Sukses');
        cart = [];
        
        const qtySpans = document.querySelectorAll('[id^="qty-"]');
        qtySpans.forEach(span => span.innerText = '0');
        
        document.getElementById('customer-name').value = '';
        
        updateCartUI();
        hideCartModal();
    });
}

window.onload = () => {
    if (tableNumber) {
        document.getElementById('table-number-display').classList.remove('hidden');
        document.getElementById('table-number-text').innerText = tableNumber;
    }
    applySettings();
    renderAdminCategories();
    renderAdminMenus();
    renderAdminUsers();
    renderAdminTables();
    renderPublicCategories();
    renderPublic('all');
    if (sessionStorage.getItem('isLoggedIn') === 'true') {
        document.getElementById('nav-logout-top').classList.remove('hidden');
        document.getElementById('nav-dashboard-toggle').classList.remove('hidden');
        document.getElementById('nav-admin-btn').classList.add('hidden');
        renderCategoryRadios();
        showView('dashboard-view');
    } else {
        document.getElementById('nav-logout-top').classList.add('hidden');
        document.getElementById('nav-dashboard-toggle').classList.add('hidden');
        document.getElementById('nav-admin-btn').classList.remove('hidden');
        renderCategoryRadios();
        showPublic();
    }
};
</script>
</body>
</html>
